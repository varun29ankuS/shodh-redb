name: Benchmarks

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # GATE: Pure-compute benchmarks (vector_ops)
  #
  # On PRs: check out master, build a fresh baseline, then switch to
  # the PR branch and compare -- all in the same job on the same runner.
  # This eliminates cross-run variance from different runner hardware.
  #
  # On master pushes: no comparison needed (baseline is always fresh).
  # ------------------------------------------------------------------
  bench-gate:
    name: Performance Gate (vector ops)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch enough history to check out both master and the PR branch.
          fetch-depth: 0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: bench-gate-${{ runner.os }}-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: bench-gate-${{ runner.os }}-

      - name: Install Rust
        run: rustup component add rustfmt

      - name: Stabilize CPU for benchmarking
        run: |
          # Pin CPU governor to performance mode (constant frequency, no scaling)
          if command -v cpupower &>/dev/null; then
            sudo cpupower frequency-set -g performance || true
          fi
          # Disable turbo boost to prevent thermal throttling variance
          if [ -f /sys/devices/system/cpu/intel_pstate/no_turbo ]; then
            echo 1 | sudo tee /sys/devices/system/cpu/intel_pstate/no_turbo || true
          fi
          if [ -f /sys/devices/system/cpu/cpufreq/boost ]; then
            echo 0 | sudo tee /sys/devices/system/cpu/cpufreq/boost || true
          fi

      - name: Run vector_ops benchmarks
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Step 1: Build baseline from master on THIS runner.
            git checkout ${{ github.event.pull_request.base.sha }}
            cargo bench --bench criterion_vector_ops -p shodh-redb \
              -- --save-baseline master 2>&1

            # Cooldown: let CPU thermal state settle between runs
            sleep 10

            # Step 2: Switch back to PR branch and compare.
            git checkout ${{ github.sha }}
            cargo bench --bench criterion_vector_ops -p shodh-redb \
              -- --baseline master 2>&1 | tee bench_gate_output.txt

            # Fail only if a majority of benchmarks regressed. A real regression
            # affects all similar benchmarks; thermal bias / scheduler noise
            # hits only a few. This eliminates false positives from sequential
            # baseline-then-PR runs on shared runners.
            REGRESSED=$(grep -c "regressed" bench_gate_output.txt || true)
            IMPROVED=$(grep -c "improved" bench_gate_output.txt || true)
            TOTAL=$((REGRESSED + IMPROVED))
            echo "Benchmark results: $REGRESSED regressed, $IMPROVED improved out of $TOTAL changed"
            if [ "$TOTAL" -gt 0 ] && [ "$REGRESSED" -gt $((TOTAL / 2)) ] && [ "$REGRESSED" -ge 3 ]; then
              echo ""
              echo "============================================================"
              echo "REGRESSION DETECTED: $REGRESSED/$TOTAL benchmarks regressed."
              echo "Baseline and PR measured on the same runner."
              echo "============================================================"
              echo ""
              grep -B2 "regressed" bench_gate_output.txt
              exit 1
            fi
          else
            # Master push: just run benchmarks (no comparison needed).
            cargo bench --bench criterion_vector_ops -p shodh-redb \
              -- --save-baseline master
          fi
        env:
          RUSTFLAGS: ""

  # ------------------------------------------------------------------
  # ADVISORY: I/O-bound benchmarks (kv, blob, ivfpq)
  #
  # These involve disk writes, file creation, and memory allocation.
  # Shared GitHub Actions runners introduce 30-50% wall-time variance
  # on I/O workloads, making hard gates unreliable. Instead, we post
  # an advisory comment on PRs with benchmark-action (15% comment
  # threshold) and NEVER fail CI.
  # ------------------------------------------------------------------
  bench-report:
    name: Benchmark Report (I/O)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: bench-report-${{ runner.os }}-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: bench-report-${{ runner.os }}-

      - name: Install Rust
        run: rustup component add rustfmt

      - name: Run I/O benchmarks
        run: |
          cargo bench --bench criterion_kv \
                      --bench criterion_blob \
                      --bench criterion_ivfpq \
                      -p shodh-redb \
                      -- --output-format bencher 2>/dev/null | grep "^test " | tee bench_output.txt
        env:
          RUSTFLAGS: ""

      - name: Restore advisory baseline
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        with:
          path: .bench_baseline.json
          key: bench-advisory-baseline-${{ runner.os }}

      - name: Post benchmark comparison
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: shodh-redb I/O benchmarks (advisory)
          tool: cargo
          output-file-path: bench_output.txt
          external-data-json-path: .bench_baseline.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          comment-on-alert: true
          alert-threshold: "115%"
          # Advisory only -- never fail CI on I/O benchmarks.
          fail-on-alert: false
          comment-always: ${{ github.event_name == 'pull_request' }}
          alert-comment-cc-users: "@varun29ankuS"

      - name: Save advisory baseline
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/cache/save@v4
        with:
          path: .bench_baseline.json
          key: bench-advisory-baseline-${{ runner.os }}
