[package]
name = "redb-fuzz"
version = "0.0.0"
authors = ["Automatically generated"]
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
arbitrary = { version = "1.1.0", features = ["derive"] }
libfuzzer-sys = { version = "0.4.0", features = ["arbitrary-derive"] }
tempfile = "3.2.0"
rand = "0.8.5"
rand_distr = "0.4.3"

[dependencies.redb]
package = "shodh-redb"
path = ".."
features = ["std"]

# Fuzzer feeds corrupted data; debug assertions in the allocator and
# page manager fire on inconsistent state that is expected during crash
# recovery. Disable debug assertions so the fuzzer tests the production
# code path (which handles corruption via Result/StorageError).
[profile.release]
debug-assertions = false
# Allow catch_unwind to work: corrupted on-disk data from simulated
# crashes can trigger assert!() in bitmap/allocator during recovery.
# The fuzz harness wraps iterations in catch_unwind to treat these as
# expected corruption rather than test failures.
panic = "unwind"

# Prevent this from interfering with workspaces
[workspace]
members = ["."]

[[bin]]
name = "fuzz_redb"
path = "fuzz_targets/fuzz_redb.rs"
test = false
doc = false

[[bin]]
name = "fuzz_vector_ops"
path = "fuzz_targets/fuzz_vector_ops.rs"
test = false
doc = false

[[bin]]
name = "fuzz_quantization"
path = "fuzz_targets/fuzz_quantization.rs"
test = false
doc = false

