[package]
name = "redb-fuzz"
version = "0.0.0"
authors = ["Automatically generated"]
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
arbitrary = { version = "1.1.0", features = ["derive"] }
libfuzzer-sys = { version = "0.4.0", features = ["arbitrary-derive"] }
tempfile = "3.2.0"
rand = "0.8.5"
rand_distr = "0.4.3"

[dependencies.redb]
package = "shodh-redb"
path = ".."
features = []

# Prevent this from interfering with workspaces
[workspace]
members = ["."]

[[bin]]
name = "fuzz_redb"
path = "fuzz_targets/fuzz_redb.rs"
test = false
doc = false

[[bin]]
name = "fuzz_vector_ops"
path = "fuzz_targets/fuzz_vector_ops.rs"
test = false
doc = false

[[bin]]
name = "fuzz_quantization"
path = "fuzz_targets/fuzz_quantization.rs"
test = false
doc = false

[[bin]]
name = "fuzz_blob_types"
path = "fuzz_targets/fuzz_blob_types.rs"
test = false
doc = false

[[bin]]
name = "fuzz_ivfpq_kmeans"
path = "fuzz_targets/fuzz_ivfpq_kmeans.rs"
test = false
doc = false

